name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME (-> $TAG_VERSION) does not match pyproject version $PROJECT_VERSION"
            exit 1
          fi
      - name: Install build dependencies
        run: python -m pip install --upgrade pip build
      - name: Build distributions
        run: python -m build
      - name: Inspect distributions
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (pre-releases)
    needs: build
    runs-on: ubuntu-latest
    if: contains(github.ref, 'a') || contains(github.ref, 'b') || contains(github.ref, 'rc')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/openpls-engine
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI (stable releases)
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, 'a') && !contains(github.ref, 'b') && !contains(github.ref, 'rc') }}
    environment:
      name: pypi
      url: https://pypi.org/p/openpls-engine
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IS_PRERELEASE=""
          if [[ "$GITHUB_REF_NAME" == *a* || "$GITHUB_REF_NAME" == *b* || "$GITHUB_REF_NAME" == *rc* ]]; then
            IS_PRERELEASE="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            $IS_PRERELEASE \
            dist/*
